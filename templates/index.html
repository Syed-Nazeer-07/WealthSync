<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finora - Personal Finance OS</title>
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}?v=2">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16x16.png') }}?v=2">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}?v=2">
    <link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}?v=2">
    
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        };
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            /* Dark mode backgrounds */
            .dark .dark\:bg-slate-950 { background-color: rgb(2 6 23); }
            .dark .dark\:bg-slate-900 { background-color: rgb(15 23 42); }
            .dark .dark\:bg-slate-800 { background-color: rgb(30 41 59); }
            .dark .dark\:bg-slate-700 { background-color: rgb(51 65 85); }
            .dark .dark\:bg-slate-600 { background-color: rgb(71 85 105); }
            .dark .dark\:bg-white { background-color: rgb(255 255 255); }
            .dark .dark\:bg-slate-800\/20 { background-color: rgba(30 41 59 / 0.2); }
            .dark .dark\:bg-slate-800\/30 { background-color: rgba(30 41 59 / 0.3); }
            .dark .dark\:bg-slate-800\/50 { background-color: rgba(30 41 59 / 0.5); }
            .dark .dark\:bg-slate-900\/50 { background-color: rgba(15 23 42 / 0.5); }
            .dark .dark\:bg-rose-500\/10 { background-color: rgba(244 63 94 / 0.1); }
            .dark .dark\:bg-emerald-500\/10 { background-color: rgba(16 185 129 / 0.1); }
            .dark .dark\:bg-amber-500\/10 { background-color: rgba(245 158 11 / 0.1); }
            .dark .dark\:bg-blue-500\/10 { background-color: rgba(59 130 246 / 0.1); }
            .dark .dark\:bg-brand-500\/10 { background-color: rgba(59 130 246 / 0.1); }
            
            /* Dark mode text colors */
            .dark .dark\:text-white { color: rgb(255 255 255); }
            .dark .dark\:text-slate-200 { color: rgb(226 232 240); }
            .dark .dark\:text-slate-300 { color: rgb(203 213 225); }
            .dark .dark\:text-slate-400 { color: rgb(148 163 184); }
            .dark .dark\:text-slate-500 { color: rgb(100 116 139); }
            .dark .dark\:text-slate-600 { color: rgb(71 85 105); }
            .dark .dark\:text-slate-800 { color: rgb(30 41 59); }
            .dark .dark\:text-slate-900 { color: rgb(15 23 42); }
            .dark .dark\:text-emerald-400 { color: rgb(52 211 153); }
            .dark .dark\:text-emerald-300 { color: rgb(110 231 183); }
            .dark .dark\:text-rose-400 { color: rgb(251 113 133); }
            .dark .dark\:text-rose-300 { color: rgb(253 164 175); }
            .dark .dark\:text-amber-400 { color: rgb(251 191 36); }
            .dark .dark\:text-amber-300 { color: rgb(252 211 77); }
            .dark .dark\:text-blue-300 { color: rgb(147 197 253); }
            .dark .dark\:text-brand-400 { color: rgb(96 165 250); }
            .dark .dark\:text-brand-300 { color: rgb(147 197 253); }
            .dark .dark\:text-orange-400 { color: rgb(251 146 60); }
            .dark .dark\:text-red-400 { color: rgb(248 113 113); }
            
            /* Dark mode borders */
            .dark .dark\:border-slate-700 { border-color: rgb(51 65 85); }
            .dark .dark\:border-slate-800 { border-color: rgb(30 41 59); }
            .dark .dark\:border-slate-700\/50 { border-color: rgba(51 65 85 / 0.5); }
            .dark .dark\:border-rose-500\/20 { border-color: rgba(244 63 94 / 0.2); }
            .dark .dark\:border-rose-500\/30 { border-color: rgba(244 63 94 / 0.3); }
            .dark .dark\:border-emerald-500\/20 { border-color: rgba(16 185 129 / 0.2); }
            .dark .dark\:border-emerald-500\/30 { border-color: rgba(16 185 129 / 0.3); }
            .dark .dark\:border-amber-500\/20 { border-color: rgba(245 158 11 / 0.2); }
            .dark .dark\:border-blue-500\/20 { border-color: rgba(59 130 246 / 0.2); }
            .dark .dark\:border-brand-500\/20 { border-color: rgba(59 130 246 / 0.2); }
            
            /* Dark mode hover states */
            .dark .dark\:hover\:bg-slate-800:hover { background-color: rgb(30 41 59); }
            .dark .dark\:hover\:text-white:hover { color: rgb(255 255 255); }
            .dark .dark\:hover\:text-slate-200:hover { color: rgb(226 232 240); }
            .dark .dark\:hover\:text-brand-400:hover { color: rgb(96 165 250); }
            
            /* Fix text without explicit dark variants */
            .dark .text-slate-900:not([class*="dark:"]) { color: rgb(255 255 255); }
            .dark .text-slate-800:not([class*="dark:"]) { color: rgb(226 232 240); }
            .dark .text-slate-700:not([class*="dark:"]) { color: rgb(203 213 225); }
            .dark .text-slate-600:not([class*="dark:"]) { color: rgb(148 163 184); }
            .dark .text-slate-500:not([class*="dark:"]) { color: rgb(148 163 184); }
        }
    </style>

    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    
    <script src="https://unpkg.com/lucide@latest"></script>

    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="/static/css/style.css?v=4">
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-200 transition-colors duration-300 antialiased min-h-screen flex overflow-hidden selection:bg-brand-500 selection:text-white">

    
    <aside id="sidebar" class="sidebar fixed md:static inset-y-0 left-0 z-40 flex flex-col h-screen bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-700 overflow-hidden">

        
        <div class="sidebar-header flex items-center border-b border-slate-100 dark:border-slate-700/50 shrink-0">
            <button onclick="App.setActiveTab('dashboard')" class="sidebar-logo-btn flex items-center gap-3 min-w-0 flex-1 hover:opacity-80 transition-opacity" title="Dashboard">
                <div class="shrink-0 w-11 h-11 rounded-xl overflow-hidden flex items-center justify-center bg-white">
                    <img id="sidebar-logo" src="/static/branding/logo1.png" alt="Finora" class="w-full h-full object-cover">
                </div>
                <span class="sidebar-text font-bold text-xl tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-600 dark:from-white dark:to-slate-400">Finora</span>
            </button>
            
            <button onclick="App.setActiveTab('dashboard')" class="sidebar-logo-icon hidden shrink-0 w-11 h-11 rounded-xl overflow-hidden hover:opacity-80 transition-opacity" title="Dashboard">
                <img id="sidebar-logo-icon" src="/static/branding/logo1.png" alt="Finora" class="w-full h-full object-cover">
            </button>
        </div>

        
        <div class="flex-1 overflow-y-auto overflow-x-hidden py-4">
            <p class="sidebar-section-label px-3 mb-2 text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Overview</p>
            <nav id="nav-menu" class="space-y-0.5 px-2">
                
            </nav>
        </div>

        
        <div class="sidebar-footer border-t border-slate-100 dark:border-slate-700/50 shrink-0">
            
            <div class="flex items-center gap-2 p-3">
                <div class="shrink-0 w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center text-slate-500 dark:text-slate-300 ring-2 ring-white dark:ring-slate-950">
                    <i data-lucide="user" class="w-4 h-4"></i>
                </div>
                <div class="sidebar-text flex-1 min-w-0">
                    <p id="sidebar-username" class="text-sm font-bold text-slate-900 dark:text-white truncate">…</p>
                    <p id="sidebar-verified-status" class="text-xs text-slate-500 dark:text-slate-400">…</p>
                </div>
                <div class="sidebar-text flex items-center gap-1 shrink-0">
                    <button aria-label="Toggle dark mode" onclick="App.toggleTheme()" class="p-1.5 text-slate-400 hover:text-brand-500 dark:hover:text-brand-400 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors focus:ring-2 focus:ring-brand-500 focus:outline-none" title="Toggle theme">
                        <i data-lucide="moon" id="theme-icon" class="w-4 h-4"></i>
                    </button>
                    <button aria-label="Sign out" onclick="App.logout()" class="p-1.5 text-slate-400 hover:text-rose-500 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors focus:ring-2 focus:ring-rose-500 focus:outline-none" title="Sign out">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </div>
    </aside>

    
    <button aria-label="Toggle sidebar collapse" id="sidebar-chevron" onclick="App.toggleSidebar()" class="hidden md:flex fixed z-50 items-center justify-center w-6 h-6 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-md text-slate-500 dark:text-slate-400 hover:text-brand-500 dark:hover:text-brand-400 hover:border-brand-400 transition-all focus:ring-2 focus:ring-brand-500 focus:outline-none" style="top: 32px;" title="Toggle sidebar">
        <i data-lucide="chevron-left" id="sidebar-chevron-icon" class="w-3.5 h-3.5 transition-transform"></i>
    </button>

    
    <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-30 hidden transition-opacity" onclick="App.closeMobileSidebar()"></div>

    
    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        
        <header class="md:hidden glass z-20 px-4 py-4 flex justify-between items-center sticky top-0 border-b border-slate-200 dark:border-slate-700">
            <div class="flex items-center gap-2">
                <button aria-label="Open menu" onclick="App.toggleMobileMenu()" class="p-2 text-slate-600 dark:text-slate-300 focus:ring-2 focus:ring-brand-500 rounded-lg focus:outline-none">
                    <i data-lucide="menu" id="mobile-menu-icon" class="w-6 h-6"></i>
                </button>
                <button aria-label="Toggle dark mode" onclick="App.toggleTheme()" class="p-2 text-slate-600 dark:text-slate-300 focus:ring-2 focus:ring-brand-500 rounded-lg focus:outline-none">
                    <i data-lucide="moon" id="theme-icon-mobile" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="flex items-center gap-2">
                <span class="font-bold text-lg dark:text-white">Finora</span>
                <div class="w-10 h-10 rounded-lg overflow-hidden shadow">
                    <img id="mobile-logo" src="/static/branding/logo1.png" alt="Finora" class="w-full h-full object-contain">
                </div>
            </div>
        </header>

        
        <div id="main-content" class="flex-1 overflow-y-auto p-4 sm:p-8 lg:p-10 scroll-smooth">
            
        </div>
        
        <!-- Quick Add FAB -->
        <button onclick="App.openModal('transaction')" class="fixed bottom-6 right-6 lg:bottom-10 lg:right-10 w-14 h-14 bg-brand-600 hover:bg-brand-700 text-white rounded-full shadow-xl shadow-brand-500/30 flex items-center justify-center transition-all hover:scale-110 hover:-translate-y-1 focus:outline-none focus:ring-4 focus:ring-brand-500/50 z-40 group" title="Quick Add">
            <i data-lucide="plus" class="w-6 h-6 group-hover:rotate-90 transition-transform duration-300"></i>
        </button>
    </main>

    
    <!-- Force Tailwind CDN to generate ALL dark mode classes used in JS -->
    <div class="hidden dark:bg-amber-500/10 dark:bg-amber-900/20 dark:bg-blue-500/10 dark:bg-brand-500/10 dark:bg-brand-900/10 dark:bg-brand-900/20 dark:bg-emerald-500/10 dark:bg-emerald-900/20 dark:bg-orange-900/10 dark:bg-red-900/20 dark:bg-rose-500/10 dark:bg-rose-900/20 dark:bg-slate-600 dark:bg-slate-700 dark:bg-slate-800 dark:bg-slate-800/20 dark:bg-slate-800/30 dark:bg-slate-800/50 dark:bg-slate-900 dark:bg-slate-900/50 dark:bg-slate-950 dark:bg-white dark:border-amber-500/20 dark:border-amber-500/30 dark:border-blue-500/20 dark:border-brand-500/20 dark:border-brand-500/30 dark:border-brand-900/30 dark:border-emerald-500/20 dark:border-emerald-500/30 dark:border-orange-900/30 dark:border-rose-500/20 dark:border-rose-500/30 dark:border-rose-700 dark:border-rose-900/30 dark:border-rose-900/50 dark:border-slate-700 dark:border-slate-700/50 dark:border-slate-800 dark:from-white dark:ring-slate-950 dark:text-amber-300 dark:text-amber-400 dark:text-blue-300 dark:text-brand-300 dark:text-brand-400 dark:text-emerald-300 dark:text-emerald-400 dark:text-orange-400 dark:text-red-400 dark:text-rose-300 dark:text-rose-400 dark:text-slate-200 dark:text-slate-300 dark:text-slate-400 dark:text-slate-500 dark:text-slate-600 dark:text-slate-800 dark:text-slate-900 dark:text-white dark:to-slate-400 dark:hover:bg-slate-800 dark:hover:text-white dark:hover:text-slate-200 dark:hover:text-brand-400 dark:hover:bg-white/10"></div>
    
    <div id="modal-container"></div>
    
    <div id="tutorial-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
        <div class="bg-slate-900 rounded-lg max-w-md w-full mx-4 border border-slate-700">
            <div class="p-6">
                <h2 class="text-2xl font-bold text-white mb-4" id="tutorial-title">Welcome to Finora</h2>
                <p class="text-slate-300 mb-6" id="tutorial-content">Track your income, expenses, and financial goals all in one place.</p>
                <div class="flex gap-3">
                    <button onclick="skipTutorial()" class="flex-1 px-4 py-2 border border-slate-600 rounded-lg text-slate-300 hover:bg-slate-800">Skip</button>
                    <button onclick="nextTutorial()" class="flex-1 px-4 py-2 bg-brand-600 text-white rounded-lg hover:bg-brand-700" id="tutorial-btn">Next</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/ui.js"></script>
    <script src="/static/js/charts.js?v=4"></script>
    <script src="/static/js/dashboard.js?v=4"></script>
    <script src="/static/js/transactions.js?v=4"></script>
    <script src="/static/js/app.js?v=4"></script>
</body>
</html>
