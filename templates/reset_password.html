<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WealthSync – Reset Password</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: {
                dark: { bg: '#0B0F19', card: '#111827', border: '#1F2937' },
                brand: { 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb' }
            }}}
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .field { position: relative; margin-bottom: 1rem; }
        .field input {
            width: 100%;
            padding: 1rem;
            padding-top: 1.5rem;
            border: 1px solid #1F2937;
            border-radius: 0.75rem;
            background-color: #111827;
            color: white;
            outline: none;
            transition: all 0.2s ease;
        }
        .field label {
            position: absolute;
            left: 1rem;
            top: 1rem;
            font-size: 0.875rem;
            color: #64748b;
            pointer-events: none;
            transition: all 0.2s ease;
            background: #111827;
            padding: 0 0.25rem;
        }
        .field input:focus + label,
        .field input:not(:placeholder-shown) + label,
        .field input:-webkit-autofill + label {
            top: -0.5rem;
            left: 0.75rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #60a5fa;
        }
        .field input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:translateY(0) } }
        .fade-up { animation: fadeUp .45s cubic-bezier(.16,1,.3,1) both; }
    </style>
</head>
<body class="bg-dark-bg min-h-screen flex items-center justify-center p-4 sm:p-6">
    <div class="w-full max-w-md fade-up">

        
        <a href="/login" class="flex items-center justify-center gap-2.5 mb-8 group">
            <div class="p-2 bg-gradient-to-br from-brand-500 to-indigo-600 rounded-xl text-white shadow-lg shadow-brand-500/20">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            <span class="font-bold text-xl text-white group-hover:text-brand-400 transition-colors">WealthSync</span>
        </a>

        
        <div class="bg-dark-card border border-dark-border rounded-3xl overflow-hidden shadow-2xl">
            <div class="h-1 bg-gradient-to-r from-brand-500 to-indigo-500"></div>

            <div class="p-8 sm:p-10">
                <div class="mb-7">
                    <h1 class="text-2xl font-bold text-white mb-1.5">Set a new password</h1>
                    <p class="text-slate-500 text-sm">Choose a strong password for your WealthSync account.</p>
                </div>

                <form id="reset-form" onsubmit="handleReset(event)" class="space-y-5">
                    
                    <div>
                        <div class="field relative">
                            <input type="password" id="password" name="password" required placeholder=" " autocomplete="new-password"
                                oninput="updateStrength()"
                                class="w-full px-4 pr-11 py-3 bg-slate-900/80 border border-slate-800 rounded-2xl text-sm text-white focus:outline-none transition-all">
                            <label for="password">New password</label>
                            <button type="button" onclick="togglePass('password','eye1')" tabindex="-1"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors">
                                <i id="eye1" data-lucide="eye" class="w-4 h-4"></i>
                            </button>
                        </div>
                        
                        <div class="mt-2 space-y-1">
                            <div class="flex gap-1">
                                <div id="sb1" class="h-1 flex-1 rounded-full bg-slate-800 transition-all duration-300"></div>
                                <div id="sb2" class="h-1 flex-1 rounded-full bg-slate-800 transition-all duration-300"></div>
                                <div id="sb3" class="h-1 flex-1 rounded-full bg-slate-800 transition-all duration-300"></div>
                            </div>
                            <p id="strength-label" class="text-xs text-slate-600"></p>
                            <ul class="text-xs space-y-0.5">
                                <li id="req-len">   <span class="mr-1">·</span>At least 8 characters</li>
                                <li id="req-upper"> <span class="mr-1">·</span>At least 1 uppercase letter</li>
                                <li id="req-num">   <span class="mr-1">·</span>At least 1 number</li>
                            </ul>
                        </div>
                    </div>

                    
                    <div class="field relative">
                        <input type="password" id="confirm" name="confirm" required placeholder=" " autocomplete="new-password"
                            oninput="checkMatch()"
                            class="w-full px-4 pr-11 py-3 bg-slate-900/80 border border-slate-800 rounded-2xl text-sm text-white focus:outline-none transition-all">
                        <label for="confirm">Confirm new password</label>
                        <button type="button" onclick="togglePass('confirm','eye2')" tabindex="-1"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors">
                            <i id="eye2" data-lucide="eye" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <p id="match-msg" class="text-xs px-1 hidden"></p>

                    <p id="form-error" class="text-rose-400 text-sm hidden"></p>

                    <button type="submit" id="submit-btn"
                        class="w-full py-3.5 bg-gradient-to-r from-brand-600 to-indigo-600 hover:from-brand-500 hover:to-indigo-500 text-white rounded-2xl font-semibold text-sm shadow-xl shadow-brand-900/50 hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2">
                        <span>Reset Password</span>
                        <i data-lucide="check" class="w-4 h-4"></i>
                    </button>
                </form>

                
                <div id="success-state" class="hidden text-center py-4">
                    <div class="w-14 h-14 rounded-full bg-emerald-500/15 border border-emerald-500/25 flex items-center justify-center mx-auto mb-4">
                        <i data-lucide="check" class="w-7 h-7 text-emerald-400"></i>
                    </div>
                    <h2 class="text-xl font-bold text-white mb-2">Password updated!</h2>
                    <p class="text-slate-400 text-sm mb-6">Your password has been reset successfully. Sign in with your new password.</p>
                    <a href="/login"
                        class="block w-full py-3.5 bg-gradient-to-r from-brand-600 to-indigo-600 hover:from-brand-500 hover:to-indigo-500 text-white rounded-2xl font-semibold text-sm text-center transition-all hover:-translate-y-0.5">
                        Sign in to WealthSync
                    </a>
                </div>
            </div>
        </div>
    </div>

<script>
    lucide.createIcons();
    const TOKEN = {{ token | tojson }};

    function togglePass(id, iconId) {
        const inp = document.getElementById(id);
        const isHidden = inp.type === 'password';
        inp.type = isHidden ? 'text' : 'password';
        document.getElementById(iconId).setAttribute('data-lucide', isHidden ? 'eye-off' : 'eye');
        lucide.createIcons({ nodes: [document.getElementById(iconId).parentElement] });
    }

    function updateStrength() {
        const v = document.getElementById('password').value;
        const hasLen = v.length >= 8, hasUpper = /[A-Z]/.test(v), hasNum = /[0-9]/.test(v);
        const score = [hasLen, hasUpper, hasNum].filter(Boolean).length;
        const colors = ['', 'bg-rose-500', 'bg-amber-500', 'bg-emerald-500'];
        const labels = ['', 'Weak', 'Medium', 'Strong'];
        const txtCls = ['', 'text-rose-400', 'text-amber-400', 'text-emerald-400'];
        for (let i = 1; i <= 3; i++) {
            document.getElementById('sb' + i).className = 'h-1 flex-1 rounded-full transition-all duration-300 ' + (i <= score ? colors[score] : 'bg-slate-800');
        }
        const lbl = document.getElementById('strength-label');
        lbl.textContent = v.length ? labels[score] : '';
        lbl.className = 'text-xs ' + (v.length ? txtCls[score] : 'text-slate-600');
        const req = ok => ok ? 'text-xs text-emerald-500' : 'text-xs text-slate-600';
        document.getElementById('req-len').className   = req(hasLen);
        document.getElementById('req-upper').className = req(hasUpper);
        document.getElementById('req-num').className   = req(hasNum);
        checkMatch();
    }

    function checkMatch() {
        const p = document.getElementById('password').value;
        const c = document.getElementById('confirm').value;
        const msg = document.getElementById('match-msg');
        if (!c) { msg.classList.add('hidden'); return; }
        msg.classList.remove('hidden');
        msg.textContent = p === c ? '✓ Passwords match' : '✗ Passwords do not match';
        msg.className = 'text-xs px-1 ' + (p === c ? 'text-emerald-400' : 'text-rose-400');
    }

    async function handleReset(e) {
        e.preventDefault();
        const password = document.getElementById('password').value;
        const confirm  = document.getElementById('confirm').value;
        const errEl    = document.getElementById('form-error');
        const btn      = document.getElementById('submit-btn');

        if (password !== confirm) {
            errEl.textContent = 'Passwords do not match.';
            errEl.classList.remove('hidden');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="60" stroke-dashoffset="30"/></svg><span>Updating…</span>';
        errEl.classList.add('hidden');

        try {
            const res  = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: TOKEN, password })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);
            document.getElementById('reset-form').classList.add('hidden');
            document.getElementById('success-state').classList.remove('hidden');
            lucide.createIcons();
        } catch (err) {
            errEl.textContent = err.message;
            errEl.classList.remove('hidden');
            btn.disabled = false;
            btn.innerHTML = '<span>Reset Password</span><i data-lucide="check" class="w-4 h-4"></i>';
            lucide.createIcons({ nodes: [btn] });
        }
    }
</script>
</body>
</html>
