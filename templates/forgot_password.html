<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WealthSync – Forgot Password</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: {
                dark: { bg: '#0B0F19', card: '#111827', border: '#1F2937' },
                brand: { 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb' }
            }}}
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .field { position: relative; margin-bottom: 1rem; }
        .field input {
            width: 100%;
            padding: 1rem;
            padding-top: 1.5rem;
            border: 1px solid #1F2937;
            border-radius: 0.75rem;
            background-color: #111827;
            color: white;
            outline: none;
            transition: all 0.2s ease;
        }
        .field label {
            position: absolute;
            left: 1rem;
            top: 1rem;
            font-size: 0.875rem;
            color: #64748b;
            pointer-events: none;
            transition: all 0.2s ease;
            background: #111827;
            padding: 0 0.25rem;
        }
        .field input:focus + label,
        .field input:not(:placeholder-shown) + label,
        .field input:-webkit-autofill + label {
            top: -0.5rem;
            left: 0.75rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #60a5fa;
        }
        .field input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
        .field input:-webkit-autofill { -webkit-box-shadow: 0 0 0 1000px #111827 inset; -webkit-text-fill-color: white; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:translateY(0) } }
        .fade-up { animation: fadeUp .45s cubic-bezier(.16,1,.3,1) both; }
    </style>
</head>
<body class="bg-dark-bg min-h-screen flex items-center justify-center p-4 sm:p-6">
    <div class="w-full max-w-md fade-up">

        
        <a href="/login" class="flex items-center justify-center gap-2.5 mb-8 group">
            <div class="p-2 bg-gradient-to-br from-brand-500 to-indigo-600 rounded-xl text-white shadow-lg shadow-brand-500/20">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            <span class="font-bold text-xl text-white group-hover:text-brand-400 transition-colors">WealthSync</span>
        </a>

        
        <div class="bg-dark-card border border-dark-border rounded-3xl overflow-hidden shadow-2xl">
            <div class="h-1 bg-gradient-to-r from-brand-500 to-indigo-500"></div>

            
            <div id="form-state" class="p-8 sm:p-10">
                <div class="mb-7">
                    <h1 class="text-2xl font-bold text-white mb-1.5">Forgot your password?</h1>
                    <p class="text-slate-500 text-sm leading-relaxed">Enter your email address and we'll send you a link to reset your password.</p>
                </div>

                <form id="forgot-form" onsubmit="handleSubmit(event)" class="space-y-5">
                    <div class="field">
                        <input type="email" id="email" name="email" required placeholder=" " autocomplete="email"
                            class="w-full px-4 py-3 bg-slate-900/80 border border-slate-800 rounded-2xl text-sm text-white focus:outline-none transition-all">
                        <label for="email">Email address</label>
                    </div>

                    <p id="form-error" class="text-rose-400 text-sm hidden"></p>

                    <button type="submit" id="submit-btn"
                        class="w-full py-3.5 bg-gradient-to-r from-brand-600 to-indigo-600 hover:from-brand-500 hover:to-indigo-500 text-white rounded-2xl font-semibold text-sm shadow-xl shadow-brand-900/50 hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2">
                        <span>Send Reset Link</span>
                        <i data-lucide="send" class="w-4 h-4"></i>
                    </button>
                </form>
            </div>

            
            <div id="success-state" class="p-8 sm:p-10 text-center hidden">
                <div class="w-16 h-16 rounded-full bg-emerald-500/15 border border-emerald-500/25 flex items-center justify-center mx-auto mb-5">
                    <i data-lucide="mail-check" class="w-8 h-8 text-emerald-400"></i>
                </div>
                <h2 class="text-xl font-bold text-white mb-2">Check your inbox</h2>
                <p class="text-slate-400 text-sm leading-relaxed mb-1">If an account exists for</p>
                <p id="sent-email" class="font-semibold text-white text-sm mb-4"></p>
                <p class="text-slate-500 text-xs leading-relaxed mb-6">a password reset link has been sent. The link expires in <strong class="text-slate-400">1 hour</strong>.</p>
                <p class="text-slate-600 text-xs">Didn't get it? Check your spam folder or <button onclick="showForm()" class="text-brand-400 hover:text-brand-300 transition-colors underline">try again</button>.</p>
            </div>

            <div class="px-8 sm:px-10 pb-7 pt-0 border-t border-dark-border">
                <a href="/login" class="text-slate-600 hover:text-slate-400 text-xs transition-colors inline-flex items-center gap-1 mt-5">
                    <i data-lucide="arrow-left" class="w-3 h-3"></i> Back to sign in
                </a>
            </div>
        </div>
    </div>

<script>
    lucide.createIcons();

    async function handleSubmit(e) {
        e.preventDefault();
        const btn    = document.getElementById('submit-btn');
        const errEl  = document.getElementById('form-error');
        const email  = document.getElementById('email').value.trim();
        btn.disabled = true;
        btn.innerHTML = '<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="60" stroke-dashoffset="30"/></svg><span>Sending…</span>';
        errEl.classList.add('hidden');

        try {
            const res = await fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            if (!res.ok) throw new Error('Request failed');
            document.getElementById('sent-email').textContent = email;
            document.getElementById('form-state').classList.add('hidden');
            document.getElementById('success-state').classList.remove('hidden');
        } catch {
            errEl.textContent = 'Something went wrong. Please try again.';
            errEl.classList.remove('hidden');
            btn.disabled = false;
            btn.innerHTML = '<span>Send Reset Link</span><i data-lucide="send" class="w-4 h-4"></i>';
            lucide.createIcons({ nodes: [btn] });
        }
    }

    function showForm() {
        document.getElementById('success-state').classList.add('hidden');
        document.getElementById('form-state').classList.remove('hidden');
        const btn = document.getElementById('submit-btn');
        btn.disabled = false;
        btn.innerHTML = '<span>Send Reset Link</span><i data-lucide="send" class="w-4 h-4"></i>';
        lucide.createIcons({ nodes: [btn] });
    }
</script>
</body>
</html>
