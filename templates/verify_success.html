<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WealthSync – Email Verified</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{dark:{bg:'#0B0F19',card:'#111827',border:'#1F2937'},brand:{500:'#3b82f6',600:'#2563eb'}}}}}</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body{font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
        @keyframes pop{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .pop{animation:pop .5s cubic-bezier(.16,1,.3,1) both}
        .up{animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both}
    </style>
</head>
<body class="bg-dark-bg min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md text-center">

        <!-- Logo -->
        <div class="flex items-center justify-center gap-2.5 mb-10">
            <div class="p-2 bg-gradient-to-br from-brand-500 to-indigo-600 rounded-xl text-white shadow-lg">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            <span class="font-bold text-xl text-white">WealthSync</span>
        </div>

        <!-- Card -->
        <div class="bg-dark-card border border-dark-border rounded-3xl p-10">
            <div class="w-16 h-16 rounded-full bg-emerald-500/20 border border-emerald-500/30 flex items-center justify-center mx-auto mb-6 pop">
                <i data-lucide="check" class="w-8 h-8 text-emerald-400"></i>
            </div>

            <h1 class="text-2xl font-bold text-white mb-2 up" style="animation-delay:.1s">
                {% if name %}Hi {{ name }}, you're verified!{% else %}Email verified!{% endif %}
            </h1>
            <p class="text-slate-400 text-sm leading-relaxed mb-8 up" style="animation-delay:.15s">
                Your email has been confirmed. Sign in to set up your financial dashboard.
            </p>

            <a href="/login"
                class="block w-full py-3.5 bg-gradient-to-r from-brand-600 to-indigo-600 hover:from-brand-500 hover:to-indigo-500 text-white rounded-2xl font-semibold text-sm shadow-xl shadow-brand-900/50 hover:-translate-y-0.5 transition-all up"
                style="animation-delay:.2s">
                Sign in to WealthSync
            </a>
        </div>
    </div>
<script>lucide.createIcons()</script>
</body>
</html>
